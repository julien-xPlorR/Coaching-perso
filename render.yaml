# Render Blueprint — SOMMET (un seul service web gratuit qui sert l'API + le front)
# La base de données n'est PAS hébergée sur Render : on utilise Neon (externe),
# renseigné via la variable DATABASE_URL. Motif : les bases Postgres GRATUITES
# de Render sont supprimées 30 jours après leur création (voir DEPLOY.md).
services:
  - type: web
    name: sommet
    runtime: node
    plan: free
    # Build : compile le front (génère frontend/dist), puis installe le backend.
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    # Start : lance le backend, qui sert aussi frontend/dist.
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL          # chaîne Neon POOLED (hôte en -pooler), secret
        sync: false
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: STRAVA_REDIRECT_URI   # ex. https://sommet.onrender.com/api/strava/callback
        sync: false
